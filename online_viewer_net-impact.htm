                          </div>
                        </div>

                        <div className="w-full flex flex-col items-start max-w-[430px]">
                          <div 
                            className="flex items-center gap-2.5 cursor-pointer select-none mb-3 group bg-[#1e1e20] border border-[#2a2a35] px-3.5 py-1.5 rounded-full hover:bg-[#2a2a35] transition-colors"
                            onClick={() => setShowReasoning(!showReasoning)}
                          >
                            <Activity className="w-4 h-4 text-[#8ab4f8]" />
                            <span className="text-[#e3e3e3] text-xs font-medium">{showReasoning ? 'Masquer le calcul interne' : 'Afficher le calcul interne'}</span>
                            {showReasoning ? <ChevronUp className="w-4 h-4 text-[#c4c7c5]" /> : <ChevronDown className="w-4 h-4 text-[#c4c7c5]" />}
                          </div>

                          {showReasoning && (geminiPhase === 'generating' || geminiPhase === 'finished') && (
                            <div className="w-full bg-[#1e1e20] rounded-2xl p-3.5 mb-3 border border-[#2a2a35] animate-fade-in relative overflow-hidden shadow-inner">
                              <div className="absolute top-0 left-0 w-1.5 h-full bg-gradient-to-b from-blue-500 to-purple-600"></div>
                              <div className="flex items-center gap-2.5 text-blue-400 font-mono text-[11px] uppercase tracking-widest mb-3">
                                <Activity className="w-4 h-4 animate-pulse" /> Calcul interne
                              </div>
                              <div className="text-[#c4c7c5] text-xs leading-relaxed flex flex-wrap gap-x-1.5 gap-y-2.5">
                                {(geminiPhase === 'finished' ? tokens : visibleGeminiTokens).map((token, i) => (
                                  <div key={i} className="relative group animate-fade-in">
                                    <span className={`px-1.5 py-0.5 rounded ${i === activeTokenIndex ? 'bg-[#8ab4f8]/20 text-[#8ab4f8]' : 'text-[#e3e3e3]'}`}>
                                      {token.compute}
                                    </span>
                                  </div>
                                ))}
                                {geminiPhase === 'generating' && <span className="w-2.5 h-4 mt-1.5 bg-[#8ab4f8] animate-pulse"></span>}
                              </div>
                            </div>
                          )}

                          {(geminiPhase === 'generating' || geminiPhase === 'finished') && (
                            <div className="w-full bg-[#1e1e20] rounded-3xl p-4 animate-fade-in border border-[#2a2a35] shadow-lg mt-1">
                               <div className="text-xs text-[#8ab4f8] mb-3 font-medium uppercase tracking-wider">{currentScenario.geminiTitle}</div>
                               <div className="impact-justify text-[13px] text-[#e3e3e3] leading-relaxed font-light">
                                 {geminiPhase === 'generating' ? (
                                   <React.Fragment>
                                     {generatedGeminiText || `${platformPair.ai.name} prépare sa réponse...`}
                                     <span className="inline-block w-[2px] h-4 bg-[#a8c7fa] ml-1 align-middle animate-pulse"></span>
                                   </React.Fragment>
                                 ) : (
                                   fullGeminiText
                                 )}
                               </div>
                            </div>
                          )}
                        </div>
                      </div>
                    )}
                  </div>

                  {/* BAS DROITE : FEEDBACK GEMINI */}
                  <div className={`impact-step-feedback min-h-full impact-ai-feedback-shell border-l border-red-950/70 relative overflow-hidden flex flex-col items-center justify-center p-5 ${geminiPhase === 'finished' ? 'impact-feedback-visible' : 'impact-feedback-hidden'}`}>
                    <div className="relative z-10 w-full max-w-[320px] flex flex-col items-center">
                      {geminiPhase === 'finished' && (
                        <div className="impact-ai-feedback-card animate-fade-in">
                          <div className="stagger-item relative flex items-start gap-3 mb-3" style={{ animationDelay: '.25s' }}>
                            <div className="w-8 h-8 rounded-full bg-amber-500/10 border border-amber-400/25 flex items-center justify-center flex-shrink-0">
                              <PlatformLogo platform={platformPair.ai} />
                            </div>
                            <div>
                              <div className="text-amber-300 text-[10px] font-semibold uppercase tracking-[.16em] mb-1">Coût environnemental</div>
                            </div>
                          </div>

                          <div className="relative grid gap-2">
                            <div className="stagger-item impact-ai-metric" style={{ animationDelay: '1.05s' }}>
                              <div className="flex items-center justify-between mb-2">
                                <div className="flex items-center gap-2 text-blue-300 text-[11px] font-semibold uppercase tracking-wider">
                                  <Droplets className="w-4 h-4" /> Eau utilisée
                                </div>
                                <div className="text-white font-mono text-xs font-semibold">{guilt.water.toFixed(1)} cl</div>
                              </div>
                              <div className="impact-ai-meter text-blue-400">
                                <span className="bg-blue-400" style={{ width: `${Math.min(100, guilt.water * 3.7)}%` }}></span>
                              </div>
                            </div>

                            <div className="stagger-item impact-ai-metric" style={{ animationDelay: '1.85s' }}>
                              <div className="flex items-center justify-between mb-2">
                                <div className="flex items-center gap-2 text-orange-300 text-[11px] font-semibold uppercase tracking-wider">
                                  <Zap className="w-4 h-4" /> Énergie
                                </div>
                                <div className="text-white font-mono text-xs font-semibold">{guilt.energy.toFixed(1)} Wh</div>
                              </div>
                              <div className="impact-ai-meter text-orange-400">
                                <span className="bg-orange-400" style={{ width: `${Math.min(100, guilt.energy * 6.8)}%` }}></span>
                              </div>
                            </div>

                            <div className="stagger-item impact-ai-metric" style={{ animationDelay: '2.65s' }}>
                              <div className="flex items-center justify-between mb-2">
                                <div className="flex items-center gap-2 text-red-300 text-[11px] font-semibold uppercase tracking-wider">
                                  <Flame className="w-4 h-4" /> CO2 estimé
                                </div>
                                <div className="text-white font-mono text-xs font-semibold">{guilt.co2.toFixed(1)} g</div>
                              </div>
                              <div className="impact-ai-meter text-red-400">
                                <span className="bg-red-400" style={{ width: `${Math.min(100, guilt.co2 * 10)}%` }}></span>
                              </div>
                            </div>
                          </div>

                          <div className="stagger-item impact-ai-alert mt-3" style={{ animationDelay: '3.45s' }}>
                            <AlertTriangle className="w-4 h-4 text-amber-300 flex-shrink-0" />
                            <span className="impact-justify">Utilisez l'IA quand elle apporte plus qu'une recherche rapide.</span>
                          </div>
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              
                <div className="impact-action-row">
                  {globalPhase === 'done' && demoStep !== 'summary' && (
                    <button 
                      onClick={demoStep === 'google' ? goToGeminiStep : goToSummaryStep} 
                      className={`impact-replay-btn ${demoStep === 'google' ? 'impact-replay-web' : 'impact-replay-compare'}`}
                      aria-label={demoStep === 'google' ? `Voir ${platformPair.ai.name}` : 'Comparer'}
                      title={demoStep === 'google' ? `Voir ${platformPair.ai.name}` : 'Comparer'}
                    >
                      {demoStep === 'google' ? 'Recherche IA' : 'Comparer'}
                    </button>
                  )}
                </div>

              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
